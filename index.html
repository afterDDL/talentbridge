<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TalentBridge AI 高端人才迁移识别助手产品原型"
    />
    <title>TalentBridge - AI 高端人才迁移识别助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" data-action="go-workbench" aria-label="返回工作台">
          <span class="brand-mark" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
          <span class="brand-name">TalentBridge</span>
        </button>
        <div class="top-search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z" />
          </svg>
          <input aria-label="全局搜索" placeholder="搜索岗位、候选人或能力" />
          <kbd>Ctrl K</kbd>
        </div>
        <div class="top-actions">
          <span class="ai-mode" id="aiMode"><i></i><span>检测 AI 服务</span></span>
          <button class="icon-btn" title="帮助" aria-label="帮助" data-action="show-guide">?</button>
          <button class="icon-btn notification" title="通知" aria-label="通知">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4" />
            </svg>
            <span></span>
          </button>
          <button class="avatar" title="个人中心">林</button>
        </div>
      </header>

      <aside class="sidebar">
        <nav class="main-nav" aria-label="主导航">
          <button class="nav-item active" data-nav="workbench">
            <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z" /></svg>
            工作台
          </button>
          <button class="nav-item" data-nav="projects">
            <svg viewBox="0 0 24 24"><path d="M3 7h7l2 2h9v11H3zM3 7V4h7l2 3" /></svg>
            招聘项目
            <span class="nav-count">6</span>
          </button>
          <button class="nav-item" data-nav="knowledge">
            <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H6.5A2.5 2.5 0 0 0 4 21.5zm0 0v16M8 7h8m-8 4h8" /></svg>
            岗位知识库
          </button>
        </nav>

        <div class="sidebar-section">
          <p>最近访问</p>
          <button class="recent-job active" data-job="chip">
            <span class="job-icon chip">芯</span>
            <span><strong>3D 先进封装工艺工程师</strong><small>半导体 · 分析中</small></span>
          </button>
          <button class="recent-job" data-job="sales">
            <span class="job-icon sales">销</span>
            <span><strong>SaaS 大客户销售</strong><small>企业服务 · 示例</small></span>
          </button>
        </div>

        <div class="sidebar-footer">
          <button class="nav-item" data-action="show-guide">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><path d="M9.7 9a2.4 2.4 0 1 1 3.5 2.1c-.8.4-1.2.9-1.2 1.9m0 3h.01" /></svg>
            使用说明
          </button>
          <div class="ai-note"><span>AI</span><p>辅助判断，不替代招聘决策</p></div>
        </div>
      </aside>

      <main class="main-content" id="mainContent"></main>
    </div>

    <div class="toast-region" id="toastRegion" aria-live="polite"></div>

    <div class="onboarding-backdrop hidden" id="onboardingBackdrop">
      <section class="onboarding-card" role="dialog" aria-modal="true" aria-labelledby="onboardingTitle">
        <div class="onboarding-visual">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
          <div class="onboarding-path">
            <span>简历关键词</span><b>→</b><span>底层能力</span><b>→</b><span>迁移机会</span>
          </div>
        </div>
        <div class="onboarding-content">
          <p class="eyebrow">欢迎使用 TalentBridge</p>
          <h2 id="onboardingTitle">找回关键词之外的高潜人才</h2>
          <p>用一个真实案例，在 3 分钟内了解如何从 2.5D 封装经历识别可迁移至 3D 封装岗位的人才。</p>
          <div class="onboarding-points">
            <div><span>1</span><p><strong>校准岗位</strong><small>把招聘经理的隐性标准变成能力模型</small></p></div>
            <div><span>2</span><p><strong>找回人才</strong><small>识别 ATS 关键词筛选可能漏掉的人</small></p></div>
            <div><span>3</span><p><strong>验证依据</strong><small>查看事实、AI 推断和待验证缺口</small></p></div>
          </div>
          <div class="onboarding-actions">
            <button class="btn secondary" data-action="dismiss-onboarding">稍后自己探索</button>
            <button class="btn primary" data-action="start-demo">开始 3 分钟演示 →</button>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header>
          <div>
            <p class="eyebrow">候选人导入</p>
            <h2 id="modalTitle">为当前岗位添加候选人</h2>
          </div>
          <button class="icon-btn" data-action="close-modal" aria-label="关闭">×</button>
        </header>
        <div class="import-tabs">
          <button class="active" data-import-tab="sample">使用示例候选人</button>
          <button data-import-tab="upload">上传简历</button>
          <button data-import-tab="paste">粘贴简历文本</button>
        </div>
        <div id="importContent"></div>
        <footer>
          <button class="btn secondary" data-action="close-modal">取消</button>
          <button class="btn primary" id="importConfirm">导入 8 位示例候选人</button>
        </footer>
      </section>
    </div>

    <div class="resume-modal-backdrop hidden" id="resumeModalBackdrop">
      <section class="resume-modal" role="dialog" aria-modal="true" aria-labelledby="resumeModalTitle">
        <header>
          <div>
            <p class="eyebrow">候选人原始材料</p>
            <h2 id="resumeModalTitle">原始简历</h2>
            <p id="resumeModalMeta"></p>
          </div>
          <button class="icon-btn" data-action="close-resume" aria-label="关闭原始简历">×</button>
        </header>
        <div class="resume-reader">
          <div class="resume-reader-note">
            <span>原文</span>
            <p>以下内容来自候选人导入材料，未经 AI 改写。请结合右侧分析结论进行人工复核。</p>
          </div>
          <pre id="resumeOriginalText"></pre>
        </div>
        <footer>
          <button class="btn secondary" data-action="copy-resume">复制全文</button>
          <button class="btn primary" data-action="close-resume">完成查看</button>
        </footer>
      </section>
    </div>

    <script src="./vendor/mammoth.browser.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
